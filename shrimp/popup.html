<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coordinate Dimming Lens</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">Coordinate Dimming Lens</p>
        <h1>本地坐标驱动的页面聚焦</h1>
        <p class="lede">输入一个本地 URL，扩展会读取坐标并以椭圆焦点渐变突出中心区域。</p>
      </header>

      <section class="mode-guide" aria-label="自动模式预设说明">
        <p class="mode-guide__title">自动模式预设</p>
        <div class="preset-switch" role="tablist" aria-label="模式预设（UI入口）">
          <button type="button" class="preset-switch__btn is-active" data-preset="focused">Focused</button>
          <button type="button" class="preset-switch__btn" data-preset="scanning">Scanning</button>
          <button type="button" class="preset-switch__btn" data-preset="fatigue">Fatigue</button>
        </div>
        <p class="mode-guide__hint">当前仅提供 UI 入口，不会自动覆盖已有参数配置。</p>
      </section>

      <section class="card">
        <section class="quick-controls quick-controls--enable" aria-label="启用开关">
          <p class="quick-controls__title">启用状态</p>
          <label class="switch-toggle">
            <input id="enabled" type="checkbox" />
            <span class="switch-toggle__track">
              <span class="switch-toggle__thumb"></span>
            </span>
          </label>
        </section>

        <section class="quick-controls quick-controls--calibration" aria-label="校准操作">
          <p class="quick-controls__title">校准</p>
          <div class="actions">
            <button id="calibrateBtn" type="button">开始校准</button>
            <button id="resetCalibrationBtn" type="button" class="ghost">重置校准</button>
          </div>
          <div class="actions">
            <button id="openCalibrationUiBtn" type="button" class="ghost">打开后端校准页</button>
          </div>
        </section>

        <section class="quick-controls quick-controls--config" aria-label="配置读写">
          <p class="quick-controls__title">配置</p>
          <div class="actions">
            <button id="saveBtn" type="button">保存</button>
            <button id="testBtn" type="button" class="ghost">测试接口</button>
          </div>
          <div class="actions">
            <button id="readConfigBtn" type="button" class="ghost">读取服务端配置</button>
          </div>
          <p class="status" id="status">尚未读取配置。</p>
        </section>

        <label>
          本地坐标 URL
          <input id="localUrl" type="url" placeholder="http://127.0.0.1:3000/coordinate" />
        </label>

        <div class="grid two-up">
          <label>
            坐标基准
            <select id="coordinateSpace">
              <option value="auto">auto</option>
              <option value="viewport">viewport</option>
              <option value="document">document</option>
            </select>
          </label>

          <label>
            刷新间隔（ms）
            <input id="pollInterval" type="number" min="300" max="10000" step="100" />
          </label>
        </div>

        <div class="grid two-up">
          <label>
            椭圆半径 X
            <input id="focusRadiusX" type="number" min="40" max="1600" step="10" />
          </label>

          <label>
            椭圆半径 Y
            <input id="focusRadiusY" type="number" min="40" max="1600" step="10" />
          </label>
        </div>

        <div class="grid two-up">
          <label>
            焦点偏移 X（px）
            <input id="focusOffsetX" type="number" min="-3000" max="3000" step="1" />
          </label>

          <label>
            焦点偏移 Y（px）
            <input id="focusOffsetY" type="number" min="-3000" max="3000" step="1" />
          </label>
        </div>

        <div class="grid three-up">
          <label>
            边缘过渡
            <input id="feather" type="number" min="4" max="400" step="4" />
          </label>

          <label>
            动画时长（ms）
            <input id="transitionMs" type="number" min="180" max="2000" step="10" />
          </label>

          <label>
            叠层透明度
            <input id="overlayTint" type="number" min="0" max="0.35" step="0.01" />
          </label>
        </div>

        <div class="grid three-up">
          <label>
            亮度
            <input id="brightness" type="number" min="0.5" max="1.2" step="0.01" />
          </label>

          <label>
            对比度
            <input id="contrast" type="number" min="0.5" max="1.2" step="0.01" />
          </label>

          <label>
            饱和度
            <input id="saturate" type="number" min="0.5" max="1.5" step="0.01" />
          </label>
        </div>

        <section class="subpanel" aria-label="模式参数">
          <p class="subpanel__title">模式参数（可调）</p>
          <p class="subpanel__hint">三个状态的视觉参数都可手动调节，保存后立即生效。</p>

          <div class="preset-block">
            <h2>Focused Reading</h2>
            <div class="grid three-up">
              <label>
                亮度倍率
                <input id="focusedBrightnessScale" type="number" min="0.4" max="1.4" step="0.01" />
              </label>

              <label>
                对比倍率
                <input id="focusedContrastScale" type="number" min="0.4" max="1.4" step="0.01" />
              </label>

              <label>
                饱和倍率
                <input id="focusedSaturateScale" type="number" min="0.4" max="1.8" step="0.01" />
              </label>

              <label>
                暗层倍率
                <input id="focusedTintScale" type="number" min="0.2" max="2" step="0.01" />
              </label>

              <label>
                外围文字倍率
                <input id="focusedTextOutsideScale" type="number" min="0.2" max="2" step="0.01" />
              </label>

              <label>
                过渡倍率
                <input id="focusedTransitionScale" type="number" min="0.2" max="8" step="0.01" />
              </label>
            </div>
          </div>

          <div class="preset-block">
            <h2>Scanning Mode</h2>
            <div class="grid three-up">
              <label>
                亮度倍率
                <input id="scanningBrightnessScale" type="number" min="0.4" max="1.4" step="0.01" />
              </label>

              <label>
                对比倍率
                <input id="scanningContrastScale" type="number" min="0.4" max="1.4" step="0.01" />
              </label>

              <label>
                饱和倍率
                <input id="scanningSaturateScale" type="number" min="0.4" max="1.8" step="0.01" />
              </label>

              <label>
                暗层倍率
                <input id="scanningTintScale" type="number" min="0.2" max="2" step="0.01" />
              </label>

              <label>
                外围文字倍率
                <input id="scanningTextOutsideScale" type="number" min="0.2" max="2" step="0.01" />
              </label>

              <label>
                过渡倍率
                <input id="scanningTransitionScale" type="number" min="0.2" max="8" step="0.01" />
              </label>
            </div>
          </div>

          <div class="preset-block">
            <h2>Fatigue State</h2>
            <div class="grid three-up">
              <label>
                亮度倍率
                <input id="fatigueBrightnessScale" type="number" min="0.4" max="1.4" step="0.01" />
              </label>

              <label>
                对比倍率
                <input id="fatigueContrastScale" type="number" min="0.4" max="1.4" step="0.01" />
              </label>

              <label>
                饱和倍率
                <input id="fatigueSaturateScale" type="number" min="0.4" max="1.8" step="0.01" />
              </label>

              <label>
                暗层倍率
                <input id="fatigueTintScale" type="number" min="0.2" max="2" step="0.01" />
              </label>

              <label>
                外围文字倍率
                <input id="fatigueTextOutsideScale" type="number" min="0.2" max="2" step="0.01" />
              </label>

              <label>
                过渡倍率
                <input id="fatigueTransitionScale" type="number" min="0.2" max="8" step="0.01" />
              </label>
            </div>
          </div>
        </section>

        <section class="subpanel" aria-label="触发条件">
          <p class="subpanel__title">模式切换触发条件（可调）</p>
          <p class="subpanel__hint">可以按你的手感调整速度阈值、触发时长和退出条件。</p>

          <div class="grid three-up">
            <label>
              移动判定最小位移（px）
              <input id="modeMovementEpsilonPx" type="number" min="0.1" max="20" step="0.1" />
            </label>

            <label>
              快速速度阈值（px/ms）
              <input id="modeFastSpeedPxPerMs" type="number" min="0.05" max="4" step="0.01" />
            </label>

            <label>
              快速重置阈值（px/ms）
              <input id="modeFastResetSpeedPxPerMs" type="number" min="0.01" max="3" step="0.01" />
            </label>

            <label>
              Scanning 触发时长（ms）
              <input id="modeScanTriggerMs" type="number" min="200" max="8000" step="10" />
            </label>

            <label>
              Scanning 退出速度（px/ms）
              <input id="modeScanExitSpeedPxPerMs" type="number" min="0.01" max="3" step="0.01" />
            </label>

            <label>
              Scanning 退出保持（ms）
              <input id="modeScanExitHoldMs" type="number" min="80" max="3000" step="10" />
            </label>

            <label>
              Fatigue 静止判定（ms）
              <input id="modeFatigueIdleMs" type="number" min="1000" max="120000" step="100" />
            </label>

            <label>
              Fatigue 慢速阈值（px/ms）
              <input id="modeSlowSpeedPxPerMs" type="number" min="0.001" max="1" step="0.001" />
            </label>

            <label>
              慢速重置阈值（px/ms）
              <input id="modeSlowResetSpeedPxPerMs" type="number" min="0.001" max="2" step="0.001" />
            </label>

            <label>
              Fatigue 触发保持（ms）
              <input id="modeFatigueTriggerMs" type="number" min="200" max="12000" step="50" />
            </label>

            <label>
              Fatigue 退出速度（px/ms）
              <input id="modeFatigueExitSpeedPxPerMs" type="number" min="0.05" max="3" step="0.01" />
            </label>

            <label>
              速度衰减时间常数（ms）
              <input id="modeSpeedDecayTauMs" type="number" min="60" max="5000" step="10" />
            </label>

            <label>
              空闲衰减延迟（ms）
              <input id="modeDecayAfterIdleMs" type="number" min="0" max="2000" step="10" />
            </label>
          </div>
        </section>

      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
